<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Koperasi Sekolah V2</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f5f6fa}
.sidebar{width:240px;height:100vh;position:fixed;background:#212529;color:#fff}
.sidebar a{display:block;color:#fff;text-decoration:none;padding:12px 20px}
.sidebar a:hover{background:#343a40}
.main{margin-left:240px;padding:20px}
.page{display:none}
#appPage{display:none}
</style>
</head>
<body>

<div id="loginPage" class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-4">
<div class="card shadow">
<div class="card-header"><h4>Login Koperasi</h4></div>
<div class="card-body">
<input id="username" class="form-control mb-2" placeholder="Username">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">
<button class="btn btn-primary w-100" onclick="login()">Masuk</button>
</div>
</div>
</div>
</div>
</div>

<div id="appPage">
<div class="sidebar">
<h4 class="p-3">KOPERASI</h4>
<a href="#" onclick="showPage('dashboardPage')">Dashboard</a>
<a href="#" onclick="showPage('barangPage');loadBarang()">Barang</a>
<a href="#" onclick="showPage('transaksiPage')">Transaksi</a>
<a href="#" onclick="showPage('laporanPage');loadLaporan()">Laporan</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

<div id="dashboardPage" class="page">
<h3>Dashboard</h3>
<div class="row">
<div class="col-md-3"><div class="card p-3"><h6>Total Barang</h6><h2 id="totalBarang">0</h2></div></div>
<div class="col-md-3"><div class="card p-3"><h6>Total Stok</h6><h2 id="totalStok">0</h2></div></div>
</div>
</div>

<div id="barangPage" class="page">
<h3>Data Barang</h3>
<table class="table table-bordered">
<thead><tr><th>Kode</th><th>Nama</th><th>Kategori</th><th>Harga</th><th>Stok</th></tr></thead>
<tbody id="tbBarang"></tbody>
</table>
</div>

<div id="transaksiPage" class="page">
<h3>Transaksi</h3>

<div class="card mb-3">
<div class="card-body">
<div class="row">
<div class="col-md-3">
<input id="nis" class="form-control" placeholder="Masukkan NIS">
</div>
<div class="col-md-2">
<button class="btn btn-primary" onclick="cariSiswa()">Cari</button>
</div>
</div>

<hr>

<p><b>Nama :</b> <span id="namaSiswa">-</span></p>
<p><b>Kelas :</b> <span id="kelasSiswa">-</span></p>
</div>
</div>

<div class="card mb-3">
<div class="card-header">Tambah Barang</div>
<div class="card-body">
<div class="row">
<div class="col-md-2">
<input id="kodeBarangCari" class="form-control" placeholder="Kode">
</div>
<div class="col-md-2">
<button class="btn btn-secondary" onclick="cariBarang()">Cari</button>
</div>
<div class="col-md-4">
<input id="namaBarang" class="form-control" readonly placeholder="Nama Barang">
</div>
<div class="col-md-2">
<input id="hargaBarang" class="form-control" readonly placeholder="Harga">
</div>
<div class="col-md-1">
<input id="qtyBarang" type="number" value="1" min="1" class="form-control">
</div>
<div class="col-md-1">
<button class="btn btn-success" onclick="tambahKeranjang()">+</button>
</div>
</div>
</div>
</div>

<table class="table table-bordered">
<thead>
<tr>
<th>Kode</th>
<th>Nama</th>
<th>Qty</th>
<th>Harga</th>
<th>Subtotal</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="cartBody"></tbody>
</table>

<h4>Total : Rp <span id="grandTotal">0</span></h4>

<button class="btn btn-success" onclick="simpanTransaksi()">
Simpan Transaksi
</button>

</div>

<div id="laporanPage" class="page">
<h3>Laporan Penjualan</h3>
<table class="table table-bordered">
<thead>
<tr>
<th>No</th>
<th>Tanggal</th>
<th>Siswa</th>
<th>Kelas</th>
<th>Total</th>
</tr>
</thead>
<tbody id="tbLaporan"></tbody>
</table>
</div>

</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwpAIHO7oBvfr4r_te_eds5OsVz1p3U2KT4I-TTLv5AAPbi3J43uCsie9u7ThcSSfBo/exec";

let cart=[];
let barangAktif=null;

function showPage(id){
 document.querySelectorAll('.page').forEach(x=>x.style.display='none');
 document.getElementById(id).style.display='block';
}

async function post(data){
 const res=await fetch(API,{
  method:'POST',
  body:JSON.stringify(data)
 });
 return await res.json();
}

async function login(){
 const data=await post({
  action:'login',
  username:username.value,
  password:password.value
 });

 if(data.success){
  localStorage.setItem('user',JSON.stringify(data));
  loginPage.style.display='none';
  appPage.style.display='block';
  showPage('dashboardPage');
  loadDashboard();
 }else{
  alert('Login gagal');
 }
}

async function loadDashboard(){
 const data=await post({action:'dashboard'});
 totalBarang.innerHTML=data.totalBarang||0;
 totalStok.innerHTML=data.totalStok||0;
}

async function loadBarang(){
 const data=await post({action:'getBarang'});

 let html='';

 data.forEach(x=>{
  html+=`
  <tr>
  <td>${x.kode}</td>
  <td>${x.nama}</td>
  <td>${x.kategori}</td>
  <td>${x.hargaJual}</td>
  <td>${x.stok}</td>
  </tr>`;
 });

 tbBarang.innerHTML=html;
 window.dataBarang=data;
}

async function cariSiswa(){
 const data=await post({
  action:'cariSiswa',
  nis:nis.value
 });

 if(data.success){
  namaSiswa.innerText=data.nama;
  kelasSiswa.innerText=data.kelas;
 }else{
  alert('Siswa tidak ditemukan');
 }
}

function cariBarang(){

 if(!window.dataBarang){
   alert('Buka menu Barang terlebih dahulu');
   return;
 }

 const kode=kodeBarangCari.value;

 barangAktif=window.dataBarang.find(
   x=>x.kode===kode
 );

 if(!barangAktif){
   alert('Barang tidak ditemukan');
   return;
 }

 namaBarang.value=barangAktif.nama;
 hargaBarang.value=barangAktif.hargaJual;
}

function tambahKeranjang(){

 if(!barangAktif){
   alert('Cari barang terlebih dahulu');
   return;
 }

 const qty=parseInt(qtyBarang.value||1);

 cart.push({
   kode:barangAktif.kode,
   nama:barangAktif.nama,
   harga:Number(barangAktif.hargaJual),
   qty:qty
 });

 renderCart();
}

function renderCart(){

 let html='';
 let total=0;

 cart.forEach((item,index)=>{

   const subtotal=item.qty*item.harga;
   total+=subtotal;

   html+=`
   <tr>
   <td>${item.kode}</td>
   <td>${item.nama}</td>
   <td>${item.qty}</td>
   <td>${item.harga}</td>
   <td>${subtotal}</td>
   <td>
   <button class="btn btn-danger btn-sm"
   onclick="hapusItem(${index})">
   Hapus
   </button>
   </td>
   </tr>`;

 });

 cartBody.innerHTML=html;
 grandTotal.innerHTML=total.toLocaleString('id-ID');
}

function hapusItem(index){
 cart.splice(index,1);
 renderCart();
}

async function simpanTransaksi(){

 if(cart.length===0){
  alert('Keranjang kosong');
  return;
 }

 const user=JSON.parse(localStorage.getItem('user'));

 const data=await post({
  action:'jual',
  data:{
   nis:nis.value,
   namaSiswa:namaSiswa.innerText,
   kelas:kelasSiswa.innerText,
   kasir:user.nama,
   items:cart
  }
 });

 if(data.success){

  alert('Transaksi berhasil : '+data.noTransaksi);

  cart=[];
  renderCart();

  nis.value='';
  namaSiswa.innerText='-';
  kelasSiswa.innerText='-';

 }else{
  alert('Gagal menyimpan');
 }
}

async function loadLaporan(){

 const data=await post({
  action:'laporan'
 });

 let html='';

 data.forEach(x=>{
  html+=`
  <tr>
  <td>${x.no}</td>
  <td>${x.tanggal}</td>
  <td>${x.siswa}</td>
  <td>${x.kelas}</td>
  <td>${x.total}</td>
  </tr>`;
 });

 tbLaporan.innerHTML=html;
}

function logout(){
 localStorage.clear();
 location.reload();
}

window.onload=()=>{

 loadBarang();

 if(localStorage.getItem('user')){

   loginPage.style.display='none';
   appPage.style.display='block';

   showPage('dashboardPage');
   loadDashboard();

 }

};
</script>

</body>
</html>
